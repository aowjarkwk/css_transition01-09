<!DOCTYPE html>
<html lang="en">

<head>
    <title>transition 속성</title>
    <!-- transition속성 -->
    <!-- transition-delay : 지연시간(몇초있다가) -->
    <!--            duration : 변환시간 -->
    <!--            property : 어떤속성에 변형을 줄것인가 -->
    <!--            timing-function : 변형되는 보간형태(시간 vs 변화량) -->
    <!-- 보간 : 인터폴레이션(시간의 간격을 채우는 것) -->
    <!-- 보간 형태 : linear, ease(기본값), ease-in, ease-out,
                    ease-in-out -->
    
    <!-- https://yulrang.tistory.com/entry/CSS-transition -->
    <!-- https://cruiseweb.tistory.com/entry/CSS-Transition -->
<style>
    #graph{
        width: 610px;
        border: 3px solid black;
    }
    .bar{
        width: 10px; height: 50px;
        background-color: orange;
        margin: 5px;
        transition-duration: 3s;
        transition-delay: 1s;
        transition-property: width, background-color;
    }
    #graph:hover>.bar{
        width: 600px;
        background-color: green;
    }
    .bar:nth-child(1){
        transition-timing-function: linear;
    }
    .bar:nth-child(2){
        transition-timing-function: ease;
        }

    .bar:nth-child(3){
        transition-timing-function: ease-in;
    }
    .bar:nth-child(4){
        transition-timing-function: ease-out;
    }
    .bar:nth-child(5){
        transition-timing-function: ease-in-out;
    }
    .bar:nth-child(6){
        /* 베지어곡선함수 이용 http://cubic-bezier.com 이용 */
        /* 베지어곡선 : 두 점의 좌표와 거리로 곡선을 정의 */
        /*                                        x1  y1   x2  y2 */
        transition-timing-function: cubic-bezier(0.01,1.09,0.8,0.13);
    }

</style>
</head>

<body>
<h2>CSS3 트랜지션 그래프</h2>
<div id="graph">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>
</body>

</html>
