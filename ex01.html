<!DOCTYPE html>
<html lang="en">

<head>
    <title>CSS 변환효과</title>
    <!-- CSS Transition 변환효과 -->
    <!-- 위치속성 : top,left,right,bottom-->
    <!-- 크기속성 : width, height-->
    <!-- 박스속성 : margin, padding-->
    <!-- 테두리속성 : border-width, radius, color-->
    <!-- 색상속성 : color, background-color -->
    <!-- 투명도속성 : opacity-->
    <!-- 변환속성 : transform(기울기)-->
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: orange;
        /* 변환효과 : 모든것 2초동안 */
            transition: all 2s;
        }

        .box:hover {
            width: 200px;
            height: 200px;
        }
        .box:active{
            background-color: red;
            opacity: 0.5;
            border:10px solid blue;
        }
    </style>
</head>

<body>
    <div class="box"></div>
</body>

</html>
