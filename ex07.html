<!DOCTYPE html>
<html lang="en">

<head>
    <title>반응형 웹과 flexbox 연결</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-size: 32px;
            font-weight: bold;
        }

        .wrap {
            display: flex;
            /* display: flex */
            flex-wrap: wrap;
            /* 자동 개행 */
        }

        .wrap>div {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .header{
            background-color: greenyellow;
            height: 100px;
            /* grow basis*/
            flex:1 100%
        }
        .main{
            background-color: coral;
            height: 400px;
            flex:1 100%;
        }
        .ad{
            background-color: #ecb3ff;
            height: 100px;
            flex : 1 100%;
        }
        .info{
            background-color: #b3ecff;
            height: 100px;
            flex:1 100%;
        }
        .footer{
            background-color: #b3ffd9;
            height: 100px;
            flex: 1 100%;
        }
        /* 모바일 해상도 */
        @media screen and (max-width:768px)
                        and (orientation:portrait){
        .header{
            flex:1 80%;
            order: 0;
        }    
        .ad{
            flex:1 20%;
            order:1;
            height: 100px;
        }
        .main{
            order: 2;
            height: 400px;
        }
        .info{
            height: 100px;
            order:3;
            flex: 1 50%;
            display: none;
        }
        .footer{
            height: 100px;
            flex:1 50%;
            order:4;
        }
        /* 태블릿 해상도 */
        }
        @media screen and (min-width:768px) and 
        (max-width:959px) {
        
                .header{
            flex:1 100%;
            order: 0;
        }    
        .ad{
            flex:1 20%;
            order:1;
            height: 400px;
        }
        .main{
            order: 2;
            height: 400px;
            flex: 1 60%;
        }
        .info{
            height: 400px;
            order:3;
            flex: 1 20%;
        }
        .footer{
            height: 100px;
            flex:1 10%;
            order:4;
        }
            }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <p>헤더</p>
        </div>
        <div class="main">
            <p>메인</p>
        </div>
        <div class="ad">
            <p>광고</p>
        </div>
        <div class="info">
            <p>정보</p>
        </div>
        <div class="footer">
            <p>푸터</p>
        </div>
    </div>
</body>

</html>
